<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact PCS</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: auto;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 0;
      background: rgba(0,0,0,0.7);
    }

    .nav-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      height: 45px;
    }

    .navbar a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    .navbar a:hover {
      color: #7ED957;
    }

    /* HERO */
    .hero {
      height: 50vh;
      background: url('pcs-hero.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      margin-top: 70px;
    }

    .hero h1 {
      font-size: 40px;
    }

    /* CONTACT */
    .section {
      padding: 80px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 40px;
    }

    .card {
      background: #111;
      padding: 25px;
      border-radius: 10px;
    }

    .card h2 {
      color: #7ED957;
      margin-bottom: 10px;
    }

    .card p {
      color: #ccc;
      line-height: 1.6;
    }

    /* FORM */
    form input, form textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      background: #222;
      color: white;
    }

    form button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      background: #7ED957;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    form button:hover {
      background: #6bc94c;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: black;
      color: #777;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="container nav-content">
    <img src="logo.png" class="logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="container">
    <h1>Contact Us</h1>
  </div>
</section>

<!-- CONTACT SECTION -->
<section class="section container">
  <div class="grid">

    <!-- CONTACT INFO -->
    <div class="card">
      <h2>Get In Touch</h2>
      <p><strong>Phone:</strong> +675 323 2339</p>
      <p><strong>Mobile:</strong> +675 7148 4518</p>
      <p><strong>Email:</strong> enquiries@pcsgroup.com.pg</p>
      <p><strong>Address:</strong> Section 32, Allotment 5, Dogura Road, 6 Mile, Port Moresby</p>
    </div>

    <!-- CONTACT FORM -->
    <div class="card">
      <h2>Send a Message</h2>
      <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="5" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
      </form>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer>
  © 2026 Pacific Corporate Security Ltd. All rights reserved.
</footer>

</body>
</html>
